<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Notched Product Card</title>
  <style>
    /* ============================================================
     NOTCHED PRODUCT CARD
     A card with rounded corners on 3 sides, a diagonal cut on the
     top-right corner, a floating rounded-triangle accent in that
     cut, and a rounded "tab" accent on the left edge.
     ============================================================ */

    :root {
      --card-blue: #175DE3;
      --card-radius: 27px;
      /* corner roundness            */
      --card-border: 3px;
      /* outline thickness           */
      --card-width: 300px;
      /* card width (height follows the
                                   4:3-ish aspect ratio below)  */
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      flex-wrap: wrap;
      padding: 80px 24px;
      background: #eef1f7;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ---------- card wrapper ---------- */
    .product-card {
      position: relative;
      width: var(--card-width);
      max-width: 100%;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform .2s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
    }

    .product-card .card-shape {
      position: relative;
      width: 100%;
      aspect-ratio: 300 / 400;
      /* keep proportions when width changes */
    }

    /* ---------- border + corner-accent (drawn in SVG, scales with card) ---------- */
    .product-card svg.frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
      z-index: 3;
      pointer-events: none;
    }

    /* ---------- clipped content (image + text body) ---------- */
    .product-card .card-content {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* same outline as the SVG frame above, scaled to a 0-1 box   */
      clip-path: path('M 30 3 H 215 L 297 85 V 370 A 27 27 0 0 1 270 397 H 30 A 27 27 0 0 1 3 370 V 30 A 27 27 0 0 1 30 3 Z');
    }

    .product-card .card-media {
      width: 100%;
      height: 225px;
      overflow: hidden;
      background: #dde6f7;
      /* placeholder color while/if no image is set */
      flex-shrink: 0;
    }

    .product-card .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-card .card-body {
      flex: 1;
      padding: 18px 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .product-card .card-body h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #13213b;
    }

    .product-card .card-body p {
      margin: 0;
      font-size: 13.5px;
      line-height: 1.5;
      color: #5b6678;
      flex: 1;
    }

    .product-card .card-cta {
      margin-top: auto;
      font-size: 13px;
      font-weight: 600;
      color: var(--card-blue);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* ---------- left edge tab accent ---------- */
    .product-card .side-tab {
      position: absolute;
      left: 1%;
      top: 34%;
      width: 2rem;
      height: 27%;
      background: var(--card-blue);
      border-radius: 0 30px 30px 0;
      z-index: 10;
    }
  </style>
</head>

<body>

  <!-- ============ CARD 1 ============ -->
  <a class="product-card" href="#">
    <div class="card-shape">
      <div class="side-tab"></div>

      <div class="card-content">
        <div class="card-media">
          <!-- 👉 put your product image here -->
          <img src="your-image.jpg" alt="RFID and GPS tracker product photo">
        </div>
        <div class="card-body">
          <h3>RFID & GPS Tracker</h3>
          <p>Real-time container tracking with long-range RFID and GPS positioning.</p>
          <span class="card-cta">View details &rarr;</span>
        </div>
      </div>

      <svg class="frame" viewBox="0 0 300 400" preserveAspectRatio="none">
        <path d="M 30 3 H 215 L 297 85 V 370 A 27 27 0 0 1 270 397 H 30 A 27 27 0 0 1 3 370 V 30 A 27 27 0 0 1 30 3 Z"
          fill="none" stroke="var(--card-blue)" strokeWidth="3" stroke-linejoin="round" />
        <path class="" d="M 246 5 L 304 5 Q 316 5 316 17 L 316 68 Q 316 80 307.15 71.9 L 242.85 13.1 Q 234 5 246 5 Z"
      fill="var(--card-blue)"/>
      </svg>
    </div>
  </a>
